<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friends English Practice</title>
<style>
    :root {
        --primary: #6c3fa8;
        --accent: #f0b429;
        --bg: #faf7f2;
        --card: #ffffff;
        --text: #2d2a26;
        --muted: #7a746c;
        --good: #2e9e6b;
        --bad: #d64545;
        --border: #e4ddd0;
    }
    * { box-sizing: border-box; }
    body {
        font-family: "Segoe UI", Helvetica, Arial, sans-serif;
        background: var(--bg);
        margin: 0;
        padding: 20px;
        color: var(--text);
    }
    .container { max-width: 980px; margin: 0 auto; }
    header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 18px;
    }
    header h1 { margin: 0; color: var(--primary); font-size: 26px; }
    header p { margin: 4px 0 0; color: var(--muted); font-size: 14px; }
    nav.tabs {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 18px;
        border-bottom: 2px solid var(--border);
        padding-bottom: 10px;
    }
    .tab-btn {
        background: #fff;
        border: 2px solid var(--border);
        color: var(--text);
        padding: 8px 16px;
        border-radius: 20px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: all .15s;
    }
    .tab-btn:hover { border-color: var(--primary); }
    .tab-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 20px;
        margin-bottom: 18px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }
    .empty-state { text-align: center; color: var(--muted); padding: 40px 20px; }
    .season-group { margin-bottom: 16px; }
    .season-title { font-weight: 700; color: var(--primary); margin-bottom: 8px; font-size: 15px; }
    .episode-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 8px;
        background: #fffdf9;
        flex-wrap: wrap;
    }
    .episode-row .ep-info { font-size: 14px; }
    .episode-row .ep-info .ep-tag { color: var(--muted); font-size: 12px; display: block; }
    .episode-row .ep-actions { display: flex; gap: 6px; }
    button.btn {
        border: none;
        border-radius: 6px;
        padding: 8px 14px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity .15s;
    }
    button.btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: #e7e1f5; color: var(--primary); }
    .btn-danger { background: #fbe4e4; color: var(--bad); }
    .btn-accent { background: var(--accent); color: #4a3300; }
    label { font-weight: 600; font-size: 13px; display: block; margin-bottom: 5px; color: #555; }
    input[type=text], input[type=number], textarea, select {
        width: 100%;
        padding: 9px 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
        font-family: inherit;
    }
    textarea { resize: vertical; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-field { margin-bottom: 12px; }
    .hint { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
    .practice-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
    }
    .practice-header h2 { margin: 0; font-size: 20px; color: var(--primary); }
    .mode-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .mode-btn {
        background: #f1eef8;
        border: none;
        padding: 7px 14px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        color: var(--primary);
    }
    .mode-btn.active { background: var(--primary); color: #fff; }
    .score-badge {
        display: inline-block;
        background: #fff8e6;
        border: 1px solid var(--accent);
        color: #7a5b00;
        padding: 4px 10px;
        border-radius: 14px;
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 12px;
    }
    .cloze-q {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 14px;
        margin-bottom: 10px;
        background: #fffdf9;
    }
    .cloze-q .speaker { font-weight: 700; color: var(--primary); font-size: 13px; margin-bottom: 4px; }
    .cloze-q .sentence { font-size: 15px; line-height: 1.6; }
    .cloze-q input.blank-input {
        width: 110px;
        display: inline-block;
        padding: 4px 8px;
        border: 2px dashed var(--accent);
        border-radius: 4px;
        font-size: 14px;
        text-align: center;
    }
    .cloze-q input.blank-input.correct { border-color: var(--good); background: #eafbf2; }
    .cloze-q input.blank-input.incorrect { border-color: var(--bad); background: #fdecec; }
    .cloze-q .feedback { margin-top: 6px; font-size: 13px; }
    .cloze-q .feedback.correct { color: var(--good); }
    .cloze-q .feedback.incorrect { color: var(--bad); }
    .flip-card-wrap { display: flex; justify-content: center; margin-bottom: 16px; }
    .flip-card {
        width: 100%;
        max-width: 420px;
        min-height: 200px;
        perspective: 1000px;
        cursor: pointer;
    }
    .flip-inner {
        position: relative;
        width: 100%;
        height: 100%;
        min-height: 200px;
        transition: transform .5s;
        transform-style: preserve-3d;
    }
    .flip-card.flipped .flip-inner { transform: rotateY(180deg); }
    .flip-face {
        position: absolute;
        inset: 0;
        backface-visibility: hidden;
        border: 2px solid var(--primary);
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        text-align: center;
        background: #fff;
    }
    .flip-face.back { transform: rotateY(180deg); background: #f8f5ff; }
    .flip-face .word { font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
    .flip-face .pos { font-size: 13px; color: var(--muted); margin-bottom: 10px; font-style: italic; }
    .flip-face .def { font-size: 15px; margin-bottom: 10px; }
    .flip-face .example { font-size: 13px; color: var(--muted); }
    .flash-controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 8px; }
    .flash-progress { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 10px; }
    .quiz-question { font-size: 16px; margin-bottom: 14px; line-height: 1.6; }
    .quiz-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    .quiz-opt {
        text-align: left;
        border: 2px solid var(--border);
        background: #fff;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 14px;
        cursor: pointer;
    }
    .quiz-opt:hover { border-color: var(--primary); }
    .quiz-opt.selected-correct { border-color: var(--good); background: #eafbf2; }
    .quiz-opt.selected-incorrect { border-color: var(--bad); background: #fdecec; }
    .quiz-opt.reveal-correct { border-color: var(--good); background: #eafbf2; }
    .quiz-opt[disabled] { cursor: default; opacity: 0.9; }
    .listen-toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
    .listen-toolbar > div { display: flex; align-items: center; gap: 6px; font-size: 13px; }
    .listen-line {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
        padding: 8px 10px;
        border-bottom: 1px solid var(--border);
        font-size: 14px;
    }
    .listen-line.current-playing { background: #fff8e6; }
    .listen-line .speaker { font-weight: 700; color: var(--primary); min-width: 90px; }
    .listen-line .line-text { flex: 1; }
    .listen-line .dictation-box { margin-top: 6px; }
    .listen-line .dictation-result { margin-top: 6px; font-size: 13px; }
    .listen-line .dictation-result .ok { color: var(--good); font-weight: 700; }
    .listen-line .dictation-result .miss { color: var(--bad); font-weight: 700; text-decoration: underline; }
    .small-note { font-size: 12px; color: var(--muted); }
    .flex-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    @media (max-width: 640px) {
        .form-grid { grid-template-columns: 1fr; }
        .episode-row { flex-direction: column; align-items: flex-start; }
    }
</style>
</head>
<body>
<div class="container">
    <header>
        <div>
            <h1>🛋️ Friends English Practice</h1>
            <p>Paste in an episode's script and turn it into cloze, flashcard, quiz, and listening exercises.</p>
        </div>
    </header>

    <nav class="tabs">
        <button class="tab-btn" id="navLibrary" onclick="goToView('library')">📚 Library</button>
        <button class="tab-btn" id="navAdd" onclick="goToView('add')">➕ Add Episode</button>
    </nav>

    <div id="app"></div>
</div>

<script>
// ============================= Data & persistence =============================
const STOPWORDS = new Set(("a about above after again against all am an and any are aren't as at be because been "+
"before being below between both but by can't cannot could couldn't did didn't do does doesn't doing don't down "+
"during each few for from further had hadn't has hasn't have haven't having he he'd he'll he's her here here's "+
"hers herself him himself his how how's i i'd i'll i'm i've if in into is isn't it it's its itself just let's "+
"me more most mustn't my myself no nor not of off on once only or other ought our ours ourselves out over own "+
"same shan't she she'd she'll she's should shouldn't so some such than that that's the their theirs them "+
"themselves then there there's these they they'd they'll they're they've this those through to too under "+
"until up very was wasn't we we'd we'll we're we've were weren't what what's when when's where where's which "+
"while who who's whom why why's with won't would wouldn't you you'd you'll you're you've your yours yourself "+
"yourselves gonna gotta wanna kinda gotcha yeah yep nope hey oh uh uh-huh um umm huh okay ok well like just "+
"really know knew get gets got gotten going come came said says say tell told one two three well right thing "+
"things guy guys gal gals stuff lot lots literally actually totally basically kind sort maybe guess mean means "+
"look looks looking listen come on gosh oops whoa alright").split(/\s+/));

function loadEpisodes() { return JSON.parse(localStorage.getItem('friends_episodes') || '[]'); }
function saveEpisodes() { localStorage.setItem('friends_episodes', JSON.stringify(episodes)); }
function loadVocabStatus() { return JSON.parse(localStorage.getItem('friends_vocab_status') || '{}'); }
function saveVocabStatus() { localStorage.setItem('friends_vocab_status', JSON.stringify(vocabStatus)); }
function loadDictCache() { return JSON.parse(localStorage.getItem('friends_dict_cache') || '{}'); }
function saveDictCache() { localStorage.setItem('friends_dict_cache', JSON.stringify(dictCache)); }

let episodes = loadEpisodes();
let vocabStatus = loadVocabStatus();
let dictCache = loadDictCache();

let currentView = 'library';
let currentEpisodeId = null;
let currentMode = 'cloze';
let editingEpisodeId = null;

// ephemeral practice session state
let clozeState = { questions: [], score: 0, answered: 0 };
let quizState = { questions: [], index: 0, score: 0, answered: false };
let flashState = { cards: [], index: 0, flipped: false };
let listenState = { rate: 1, voiceURI: '', dictationMode: false, playingIndex: -1, dictationAnswers: {} };

// ============================= Utilities =============================
function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}
function sample(arr, n) { return shuffle(arr).slice(0, n); }
function cleanText(t) {
    return t.replace(/\([^)]*\)/g, ' ').replace(/\[[^\]]*\]/g, ' ').replace(/\s+/g, ' ').trim();
}
function normalizeWord(w) { return w.replace(/[^A-Za-z']/g, '').toLowerCase(); }

// ============================= Script parsing =============================
function parseScript(raw) {
    const lines = raw.split(/\r?\n/);
    const dialogue = [];
    let last = null;
    for (const rawLine of lines) {
        const line = rawLine.trim();
        if (!line) { last = null; continue; }
        if (/^[\[\(]/.test(line)) { last = null; continue; }
        const m = line.match(/^([A-Z][A-Za-z0-9 .'&-]{0,35}):\s*(.+)$/);
        if (m) {
            const entry = { speaker: m[1].trim(), text: m[2].trim() };
            dialogue.push(entry);
            last = entry;
        } else if (last) {
            last.text += ' ' + line;
        }
    }
    return dialogue;
}

function analyzeEpisode(dialogue) {
    const speakerCounts = {};
    dialogue.forEach(d => { speakerCounts[d.speaker] = (speakerCounts[d.speaker] || 0) + 1; });
    const speakerNamesLower = new Set(Object.keys(speakerCounts).map(s => s.toLowerCase()));

    const vocabMap = {};
    dialogue.forEach(d => {
        const clean = cleanText(d.text);
        const words = clean.match(/[A-Za-z']+/g) || [];
        words.forEach(w => {
            const norm = normalizeWord(w);
            if (norm.length < 4) return;
            if (STOPWORDS.has(norm)) return;
            if (speakerNamesLower.has(norm)) return;
            if (!vocabMap[norm]) vocabMap[norm] = { word: norm, count: 0, example: clean };
            vocabMap[norm].count++;
        });
    });
    const vocab = Object.values(vocabMap).sort((a, b) => b.count - a.count);
    return { speakerCounts, vocab };
}

// ============================= View routing =============================
function goToView(view, episodeId) {
    currentView = view;
    if (episodeId !== undefined) currentEpisodeId = episodeId;
    if (view === 'practice') {
        currentMode = 'cloze';
        clozeState = { questions: [], score: 0, answered: 0 };
        quizState = { questions: [], index: 0, score: 0, answered: false };
        flashState = { cards: [], index: 0, flipped: false };
        listenState = { rate: 1, voiceURI: '', dictationMode: false, playingIndex: -1, dictationAnswers: {} };
    }
    render();
}

function getEpisode(id) { return episodes.find(e => e.id === id); }

function render() {
    document.getElementById('navLibrary').classList.toggle('active', currentView === 'library');
    document.getElementById('navAdd').classList.toggle('active', currentView === 'add' || currentView === 'edit');
    const app = document.getElementById('app');
    if (currentView === 'library') app.innerHTML = renderLibrary();
    else if (currentView === 'add' || currentView === 'edit') app.innerHTML = renderAddForm();
    else if (currentView === 'practice') renderPractice(app);
}

// ============================= Library =============================
function renderLibrary() {
    if (episodes.length === 0) {
        return `<div class="card empty-state">
            <p>No episodes saved yet.</p>
            <button class="btn btn-primary" onclick="goToView('add')">➕ Add your first episode</button>
        </div>`;
    }
    const bySeason = {};
    episodes.forEach(ep => {
        const s = ep.season || 0;
        if (!bySeason[s]) bySeason[s] = [];
        bySeason[s].push(ep);
    });
    const seasons = Object.keys(bySeason).map(Number).sort((a, b) => a - b);
    let html = '<div class="card">';
    seasons.forEach(s => {
        bySeason[s].sort((a, b) => (a.episode || 0) - (b.episode || 0));
        html += `<div class="season-group"><div class="season-title">Season ${s}</div>`;
        bySeason[s].forEach(ep => {
            html += `<div class="episode-row">
                <div class="ep-info">
                    <strong>${escapeHtml(ep.title || '(untitled)')}</strong>
                    <span class="ep-tag">S${ep.season}E${ep.episode} &middot; ${ep.dialogue.length} lines &middot; ${ep.vocab.length} vocab words</span>
                </div>
                <div class="ep-actions">
                    <button class="btn btn-primary" onclick="goToView('practice', ${ep.id})">▶ Practice</button>
                    <button class="btn btn-secondary" onclick="startEditEpisode(${ep.id})">✏️ Edit</button>
                    <button class="btn btn-danger" onclick="deleteEpisode(${ep.id})">🗑️ Delete</button>
                </div>
            </div>`;
        });
        html += '</div>';
    });
    html += '</div>';
    return html;
}

function deleteEpisode(id) {
    if (!confirm('Delete this episode and its saved script?')) return;
    episodes = episodes.filter(e => e.id !== id);
    saveEpisodes();
    render();
}

function startEditEpisode(id) {
    editingEpisodeId = id;
    currentView = 'edit';
    render();
}

// ============================= Add / Edit episode form =============================
function renderAddForm() {
    const editing = currentView === 'edit' ? getEpisode(editingEpisodeId) : null;
    return `<div class="card">
        <h2 style="margin-top:0;color:var(--primary);">${editing ? 'Edit Episode' : 'Add New Episode'}</h2>
        <p class="hint">Go to <strong>livesinabox.com/friends/scripts.shtml</strong>, open the episode you want, select the whole script text, copy it, and paste it below. Lines formatted as <code>Speaker: dialogue</code> will be parsed automatically; scene directions like <code>[Scene: ...]</code> are skipped.</p>
        <div class="form-grid">
            <div class="form-field">
                <label for="fSeason">Season #</label>
                <input type="number" id="fSeason" min="1" value="${editing ? editing.season : ''}">
            </div>
            <div class="form-field">
                <label for="fEpisode">Episode #</label>
                <input type="number" id="fEpisode" min="1" value="${editing ? editing.episode : ''}">
            </div>
        </div>
        <div class="form-field">
            <label for="fTitle">Episode Title</label>
            <input type="text" id="fTitle" placeholder="e.g. The One Where Monica Gets a Roommate" value="${editing ? escapeHtml(editing.title) : ''}">
        </div>
        <div class="form-field">
            <label for="fScript">Script Text</label>
            <textarea id="fScript" rows="14" placeholder="Paste the full episode script here...">${editing ? escapeHtml(editing.raw) : ''}</textarea>
        </div>
        <div class="flex-row">
            <button class="btn btn-primary" onclick="saveEpisodeForm(${editing ? editing.id : 'null'})">💾 Save Episode</button>
            ${editing ? `<button class="btn btn-secondary" onclick="goToView('library')">Cancel</button>` : ''}
        </div>
    </div>`;
}

function saveEpisodeForm(editId) {
    const season = parseInt(document.getElementById('fSeason').value, 10) || 0;
    const episode = parseInt(document.getElementById('fEpisode').value, 10) || 0;
    const title = document.getElementById('fTitle').value.trim();
    const raw = document.getElementById('fScript').value;

    if (!raw.trim()) { alert('Please paste the script text.'); return; }

    const dialogue = parseScript(raw);
    if (dialogue.length === 0) {
        alert("Couldn't find any lines in the format 'Speaker: text'. Please check the pasted script.");
        return;
    }
    const { speakerCounts, vocab } = analyzeEpisode(dialogue);

    if (editId) {
        const ep = getEpisode(editId);
        ep.season = season; ep.episode = episode; ep.title = title;
        ep.raw = raw; ep.dialogue = dialogue; ep.speakerCounts = speakerCounts; ep.vocab = vocab;
    } else {
        episodes.push({
            id: Date.now(), season, episode, title, raw, dialogue, speakerCounts, vocab
        });
    }
    saveEpisodes();
    editingEpisodeId = null;
    goToView('library');
}

// ============================= Practice hub =============================
function renderPractice(app) {
    const ep = getEpisode(currentEpisodeId);
    if (!ep) { goToView('library'); return; }

    let inner = `<div class="practice-header">
        <h2>S${ep.season}E${ep.episode} &middot; ${escapeHtml(ep.title || '(untitled)')}</h2>
        <button class="btn btn-secondary" onclick="goToView('library')">&larr; Back to Library</button>
    </div>
    <div class="mode-tabs">
        <button class="mode-btn ${currentMode === 'cloze' ? 'active' : ''}" onclick="switchMode('cloze')">✏️ Cloze</button>
        <button class="mode-btn ${currentMode === 'flash' ? 'active' : ''}" onclick="switchMode('flash')">🗂️ Flashcards</button>
        <button class="mode-btn ${currentMode === 'quiz' ? 'active' : ''}" onclick="switchMode('quiz')">❓ Quiz</button>
        <button class="mode-btn ${currentMode === 'listen' ? 'active' : ''}" onclick="switchMode('listen')">🔊 Listening</button>
    </div>
    <div id="modeContent"></div>`;
    app.innerHTML = inner;

    const modeContent = document.getElementById('modeContent');
    if (currentMode === 'cloze') renderCloze(modeContent, ep);
    else if (currentMode === 'flash') renderFlashcards(modeContent, ep);
    else if (currentMode === 'quiz') renderQuiz(modeContent, ep);
    else if (currentMode === 'listen') renderListening(modeContent, ep);
}

function switchMode(mode) {
    currentMode = mode;
    render();
}

// ============================= Cloze mode =============================
function makeClozeQuestion(line) {
    const clean = cleanText(line.text);
    const words = clean.split(/\s+/).filter(Boolean);
    const candidates = [];
    words.forEach((w, i) => {
        const norm = normalizeWord(w);
        if (norm.length >= 4 && !STOPWORDS.has(norm)) candidates.push(i);
    });
    if (candidates.length === 0) return null;
    const idx = candidates[Math.floor(Math.random() * candidates.length)];
    const answer = normalizeWord(words[idx]);
    const displayWords = words.slice();
    displayWords[idx] = '_____';
    return { speaker: line.speaker, sentence: displayWords.join(' '), answer };
}

function generateClozeSet(ep) {
    const eligible = ep.dialogue.filter(d => cleanText(d.text).split(/\s+/).length >= 3);
    const picked = sample(eligible, Math.min(10, eligible.length));
    const questions = picked.map(makeClozeQuestion).filter(Boolean).map(q => ({ ...q, userAnswer: '', checked: false, correct: null }));
    clozeState = { questions, score: 0, answered: 0 };
}

function renderCloze(container, ep) {
    if (clozeState.questions.length === 0) generateClozeSet(ep);
    let html = `<div class="card">
        <div class="flex-row" style="justify-content:space-between;margin-bottom:10px;">
            <span class="score-badge">Score: ${clozeState.score} / ${clozeState.answered}</span>
            <button class="btn btn-accent" onclick="regenerateCloze()">🔄 New Set</button>
        </div>`;
    clozeState.questions.forEach((q, i) => {
        const stateClass = q.checked ? (q.correct ? 'correct' : 'incorrect') : '';
        html += `<div class="cloze-q">
            <div class="speaker">${escapeHtml(q.speaker)}</div>
            <div class="sentence">${escapeHtml(q.sentence).replace('_____', `<input type="text" class="blank-input ${stateClass}" id="clozeInput${i}" value="${escapeHtml(q.userAnswer)}" ${q.checked ? 'disabled' : ''} onkeydown="if(event.key==='Enter')checkClozeAnswer(${i})">`)}</div>
            ${!q.checked ? `<div style="margin-top:8px;"><button class="btn btn-secondary" onclick="checkClozeAnswer(${i})">Check</button></div>` : ''}
            ${q.checked ? `<div class="feedback ${q.correct ? 'correct' : 'incorrect'}">${q.correct ? '✅ Correct!' : `❌ Correct answer: <strong>${escapeHtml(q.answer)}</strong>`}</div>` : ''}
        </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
}

function checkClozeAnswer(i) {
    const q = clozeState.questions[i];
    if (q.checked) return;
    const input = document.getElementById('clozeInput' + i);
    const val = normalizeWord(input.value.trim());
    q.userAnswer = input.value.trim();
    q.correct = val === q.answer;
    q.checked = true;
    clozeState.answered++;
    if (q.correct) clozeState.score++;
    renderCloze(document.getElementById('modeContent'), getEpisode(currentEpisodeId));
}

function regenerateCloze() {
    generateClozeSet(getEpisode(currentEpisodeId));
    render();
}

// ============================= Flashcards mode =============================
async function fetchDefinition(word) {
    if (dictCache[word]) return dictCache[word];
    try {
        const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
        if (!res.ok) throw new Error('not found');
        const data = await res.json();
        const entry = data[0];
        const meaning = entry.meanings && entry.meanings[0];
        const def = meaning && meaning.definitions && meaning.definitions[0];
        const result = {
            partOfSpeech: meaning ? meaning.partOfSpeech : '',
            definition: def ? def.definition : '',
            phonetic: entry.phonetic || ''
        };
        dictCache[word] = result;
        saveDictCache();
        return result;
    } catch (e) {
        dictCache[word] = null;
        return null;
    }
}

function generateFlashSet(ep) {
    flashState = { cards: ep.vocab.slice(0, 40), index: 0, flipped: false };
}

function renderFlashcards(container, ep) {
    if (flashState.cards.length === 0) {
        if (ep.vocab.length === 0) {
            container.innerHTML = `<div class="card empty-state">No vocabulary could be extracted from this episode's dialogue.</div>`;
            return;
        }
        generateFlashSet(ep);
    }
    const card = flashState.cards[flashState.index];
    const status = vocabStatus[card.word] || 'new';
    const knownCount = flashState.cards.filter(c => vocabStatus[c.word] === 'known').length;

    let html = `<div class="card">
        <div class="flash-progress">Card ${flashState.index + 1} / ${flashState.cards.length} &middot; Known: ${knownCount} / ${flashState.cards.length}</div>
        <div class="flip-card-wrap">
            <div class="flip-card ${flashState.flipped ? 'flipped' : ''}" onclick="flipCard()">
                <div class="flip-inner">
                    <div class="flip-face front">
                        <div class="word">${escapeHtml(card.word)}</div>
                        <div class="small-note">seen ${card.count} time${card.count > 1 ? 's' : ''} &middot; ${status === 'known' ? '⭐ known' : 'tap to reveal'}</div>
                    </div>
                    <div class="flip-face back" id="cardBack">
                        <div class="small-note">Loading definition…</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="flash-controls">
            <button class="btn btn-secondary" onclick="prevCard()">&larr; Prev</button>
            <button class="btn btn-danger" onclick="markCard('learning')">Still learning</button>
            <button class="btn btn-primary" onclick="markCard('known')">✓ I know it</button>
            <button class="btn btn-secondary" onclick="nextCard()">Next &rarr;</button>
        </div>
        <div class="flex-row" style="justify-content:center;">
            <button class="btn btn-accent" onclick="generateFlashSet(getEpisode(currentEpisodeId)); render();">🔄 Reset Deck</button>
        </div>
    </div>`;
    container.innerHTML = html;

    if (flashState.flipped) loadCardBack(card);
}

async function loadCardBack(card) {
    const backEl = document.getElementById('cardBack');
    if (!backEl) return;
    const info = await fetchDefinition(card.word);
    if (!backEl) return;
    if (info && info.definition) {
        backEl.innerHTML = `
            <div class="pos">${escapeHtml(info.partOfSpeech || '')} ${info.phonetic ? escapeHtml(info.phonetic) : ''}</div>
            <div class="def">${escapeHtml(info.definition)}</div>
            <div class="example">"${escapeHtml(card.example)}"</div>`;
    } else {
        backEl.innerHTML = `<div class="def">(No dictionary definition available — offline or word not found.)</div>
            <div class="example">"${escapeHtml(card.example)}"</div>`;
    }
}

function flipCard() {
    flashState.flipped = !flashState.flipped;
    renderFlashcards(document.getElementById('modeContent'), getEpisode(currentEpisodeId));
}
function nextCard() {
    flashState.index = (flashState.index + 1) % flashState.cards.length;
    flashState.flipped = false;
    renderFlashcards(document.getElementById('modeContent'), getEpisode(currentEpisodeId));
}
function prevCard() {
    flashState.index = (flashState.index - 1 + flashState.cards.length) % flashState.cards.length;
    flashState.flipped = false;
    renderFlashcards(document.getElementById('modeContent'), getEpisode(currentEpisodeId));
}
function markCard(status) {
    const card = flashState.cards[flashState.index];
    vocabStatus[card.word] = status;
    saveVocabStatus();
    nextCard();
}

// ============================= Quiz mode =============================
function makeWhoSaidQuestion(ep, mainSpeakers) {
    const eligible = ep.dialogue.filter(d => mainSpeakers.includes(d.speaker) && cleanText(d.text).split(/\s+/).length >= 4);
    if (eligible.length === 0) return null;
    const line = eligible[Math.floor(Math.random() * eligible.length)];
    const correct = line.speaker;
    const distractors = sample(mainSpeakers.filter(s => s !== correct), Math.min(3, mainSpeakers.length - 1));
    const options = shuffle([correct, ...distractors]);
    return { type: 'who', question: `Who said: "${cleanText(line.text)}"`, options, correct };
}

function makeNextLineQuestion(ep) {
    if (ep.dialogue.length < 5) return null;
    const i = Math.floor(Math.random() * (ep.dialogue.length - 1));
    const correct = cleanText(ep.dialogue[i + 1].text);
    if (!correct) return null;
    const otherIdx = sample(
        ep.dialogue.map((_, idx) => idx).filter(idx => idx !== i && idx !== i + 1),
        3
    );
    const distractors = otherIdx.map(idx => cleanText(ep.dialogue[idx].text)).filter(t => t && t !== correct);
    if (distractors.length < 2) return null;
    const options = shuffle([correct, ...distractors.slice(0, 3)]);
    return {
        type: 'next',
        question: `${ep.dialogue[i].speaker}: "${cleanText(ep.dialogue[i].text)}"<br>What comes next?`,
        options, correct
    };
}

function generateQuizSet(ep) {
    const mainSpeakers = Object.keys(ep.speakerCounts).filter(s => ep.speakerCounts[s] >= 3);
    const questions = [];
    let attempts = 0;
    while (questions.length < 8 && attempts < 60) {
        attempts++;
        const useWho = mainSpeakers.length >= 2 && Math.random() < 0.5;
        const q = useWho ? makeWhoSaidQuestion(ep, mainSpeakers) : makeNextLineQuestion(ep);
        if (q) questions.push(q);
    }
    quizState = { questions, index: 0, score: 0, answered: false };
}

function renderQuiz(container, ep) {
    if (quizState.questions.length === 0) generateQuizSet(ep);
    if (quizState.questions.length === 0) {
        container.innerHTML = `<div class="card empty-state">Not enough dialogue in this episode to build a quiz yet.</div>`;
        return;
    }
    if (quizState.index >= quizState.questions.length) {
        container.innerHTML = `<div class="card empty-state">
            <p>Quiz complete! Score: ${quizState.score} / ${quizState.questions.length}</p>
            <button class="btn btn-primary" onclick="regenerateQuiz()">🔄 Try Again</button>
        </div>`;
        return;
    }
    const q = quizState.questions[quizState.index];
    let html = `<div class="card">
        <div class="score-badge">Question ${quizState.index + 1} / ${quizState.questions.length} &middot; Score: ${quizState.score}</div>
        <div class="quiz-question">${q.question}</div>
        <div class="quiz-options">`;
    q.options.forEach((opt, i) => {
        let cls = '';
        if (quizState.answered) {
            if (opt === q.correct) cls = 'reveal-correct';
            else if (opt === quizState.selected && opt !== q.correct) cls = 'selected-incorrect';
        }
        html += `<button class="quiz-opt ${cls}" ${quizState.answered ? 'disabled' : ''} onclick="answerQuiz('${encodeURIComponent(opt)}')">${escapeHtml(opt)}</button>`;
    });
    html += `</div>`;
    if (quizState.answered) {
        html += `<button class="btn btn-primary" onclick="nextQuizQuestion()">${quizState.index + 1 < quizState.questions.length ? 'Next Question →' : 'See Results'}</button>`;
    }
    html += `</div>`;
    container.innerHTML = html;
}

function answerQuiz(encodedOpt) {
    if (quizState.answered) return;
    const opt = decodeURIComponent(encodedOpt);
    const q = quizState.questions[quizState.index];
    quizState.answered = true;
    quizState.selected = opt;
    if (opt === q.correct) quizState.score++;
    renderQuiz(document.getElementById('modeContent'), getEpisode(currentEpisodeId));
}

function nextQuizQuestion() {
    quizState.index++;
    quizState.answered = false;
    quizState.selected = null;
    renderQuiz(document.getElementById('modeContent'), getEpisode(currentEpisodeId));
}

function regenerateQuiz() {
    generateQuizSet(getEpisode(currentEpisodeId));
    render();
}

// ============================= Listening mode =============================
function getEnglishVoices() {
    return (window.speechSynthesis ? speechSynthesis.getVoices() : []).filter(v => v.lang && v.lang.toLowerCase().startsWith('en'));
}

function renderListening(container, ep) {
    const voices = getEnglishVoices();
    let html = `<div class="card">
        <div class="listen-toolbar">
            <button class="btn btn-primary" onclick="playAllLines()">▶ Play All</button>
            <button class="btn btn-secondary" onclick="stopPlayback()">⏹ Stop</button>
            <div>
                <label style="margin:0;">Speed</label>
                <input type="range" min="0.5" max="1.5" step="0.1" value="${listenState.rate}" oninput="listenState.rate=parseFloat(this.value)" style="width:100px;">
            </div>
            <div>
                <label style="margin:0;">Voice</label>
                <select onchange="listenState.voiceURI=this.value" style="width:auto;">
                    <option value="">Default</option>
                    ${voices.map(v => `<option value="${escapeHtml(v.voiceURI)}" ${listenState.voiceURI === v.voiceURI ? 'selected' : ''}>${escapeHtml(v.name)}</option>`).join('')}
                </select>
            </div>
            <div>
                <label style="margin:0;"><input type="checkbox" ${listenState.dictationMode ? 'checked' : ''} onchange="toggleDictationMode(this.checked)" style="width:auto;"> Dictation practice (hide text)</label>
            </div>
        </div>`;

    ep.dialogue.forEach((line, i) => {
        const clean = cleanText(line.text);
        html += `<div class="listen-line ${listenState.playingIndex === i ? 'current-playing' : ''}" id="listenLine${i}">
            <div class="speaker">${escapeHtml(line.speaker)}</div>
            <div class="line-text">`;
        if (listenState.dictationMode) {
            const answer = listenState.dictationAnswers[i];
            html += `<div class="small-note">🔊 Play then type what you hear</div>
                <div class="dictation-box">
                    <input type="text" id="dictInput${i}" placeholder="Type here..." value="${answer ? escapeHtml(answer.userText || '') : ''}" onkeydown="if(event.key==='Enter')checkDictation(${i})">
                    <button class="btn btn-secondary" style="margin-top:4px;" onclick="checkDictation(${i})">Check</button>
                </div>`;
            if (answer && answer.checked) {
                html += `<div class="dictation-result">${diffWords(answer.userText, clean)}</div>`;
            }
        } else {
            html += escapeHtml(clean);
        }
        html += `</div><button class="btn btn-secondary" onclick="playLine(${i})">🔊</button></div>`;
    });
    html += '</div>';
    container.innerHTML = html;
}

function toggleDictationMode(checked) {
    listenState.dictationMode = checked;
    render();
}

function diffWords(userText, correctText) {
    const userWords = (userText || '').trim().toLowerCase().split(/\s+/).filter(Boolean);
    const correctWords = correctText.split(/\s+/);
    return correctWords.map((w, i) => {
        const norm = normalizeWord(w);
        const match = userWords[i] && normalizeWord(userWords[i]) === norm;
        return `<span class="${match ? 'ok' : 'miss'}">${escapeHtml(w)}</span>`;
    }).join(' ');
}

function checkDictation(i) {
    const input = document.getElementById('dictInput' + i);
    listenState.dictationAnswers[i] = { userText: input.value, checked: true };
    renderListening(document.getElementById('modeContent'), getEpisode(currentEpisodeId));
}

function speakText(text, onEnd) {
    if (!window.speechSynthesis) { if (onEnd) onEnd(); return; }
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = listenState.rate;
    if (listenState.voiceURI) {
        const v = getEnglishVoices().find(v => v.voiceURI === listenState.voiceURI);
        if (v) utter.voice = v;
    }
    if (onEnd) utter.onend = onEnd;
    speechSynthesis.speak(utter);
}

function playLine(i) {
    const ep = getEpisode(currentEpisodeId);
    listenState.playingIndex = i;
    render();
    speakText(cleanText(ep.dialogue[i].text));
}

function playAllLines() {
    const ep = getEpisode(currentEpisodeId);
    let i = 0;
    function playNext() {
        if (i >= ep.dialogue.length) { listenState.playingIndex = -1; render(); return; }
        listenState.playingIndex = i;
        render();
        const row = document.getElementById('listenLine' + i);
        if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
        speakText(cleanText(ep.dialogue[i].text), () => { i++; playNext(); });
    }
    playNext();
}

function stopPlayback() {
    if (window.speechSynthesis) speechSynthesis.cancel();
    listenState.playingIndex = -1;
    render();
}

// ============================= Init =============================
if (window.speechSynthesis) {
    speechSynthesis.onvoiceschanged = () => { if (currentMode === 'listen') render(); };
}

render();
</script>
